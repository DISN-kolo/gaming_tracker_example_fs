services:
  back:
    build:
      dockerfile: Dockerfile.dev
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    volumes:
      - ./back:/app

  front:
    build:
      dockerfile: Dockerfile.dev
    ports:
      - "4200:4200"
    environment:
      - BACK_URL=http://back:5000
    volumes:
      - ./front:/app
      - /app/node_modules
      - ./certs:/certs
